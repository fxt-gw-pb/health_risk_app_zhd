name: Deploy to GitHub Pages

on:
  # 已停用「推送到 main 自动部署 Pages」——本项目改用 Vercel（含 DeepSeek 后端）。
  # 老 Pages 保持原样不动。如仍需 Pages（纯静态、AI 降级版），在 Actions 页手动
  # 运行本工作流，或把下面一行换回：
  #   push:
  #     branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
