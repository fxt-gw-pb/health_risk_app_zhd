name: Deploy to GitHub Pages

on:
  # GitHub Pages：纯静态、国内可访问（AI 抽取/RAG 问答会降级为确定性版本）。
  # 完整 AI（含 DeepSeek 后端）另由 Vercel 部署（vercel.app 国内需代理）。
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # 国内后端地址（腾讯云 SCF / 阿里云 FC）。在仓库
          # Settings → Secrets and variables → Actions → Variables 里设
          # 名为 VITE_API_BASE 的变量；未设则前端走同源 /api（Pages 上即降级）。
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
